{% extends 'base.html' %}

{% block content %}
<!-- Contact Section -->
    <section class="bg-surface-container py-stack-xl">
        <div class="max-w-[800px] mx-auto px-margin-mobile">
            <div class="bg-surface-container-lowest p-stack-lg rounded-xl ambient-shadow">
                <div class="mb-stack-lg text-center">
                    <h2 class="font-headline-lg text-headline-lg text-on-surface">Contactez-nous</h2>
                    <p class="font-body-md text-body-md text-on-surface-variant">Une question, une suggestion ou un
                        partenariat ?</p>
                </div>
                <form class="space-y-gutter">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-gutter">
                        <div class="space-y-2">
                            <label class="font-label-md text-on-surface-variant">Nom</label>
                            <input
                                class="w-full bg-surface-container-low border-none rounded-lg p-3 focus:ring-2 focus:ring-primary outline-none transition-all"
                                placeholder="Votre nom" type="text" />
                        </div>
                        <div class="space-y-2">
                            <label class="font-label-md text-on-surface-variant">Email</label>
                            <input
                                class="w-full bg-surface-container-low border-none rounded-lg p-3 focus:ring-2 focus:ring-primary outline-none transition-all"
                                placeholder="votre@email.com" type="email" />
                        </div>
                    </div>
                    <div class="space-y-2">
                        <label class="font-label-md text-on-surface-variant">Message</label>
                        <textarea
                            class="w-full bg-surface-container-low border-none rounded-lg p-3 focus:ring-2 focus:ring-primary outline-none transition-all"
                            placeholder="Comment pouvons-nous vous aider ?" rows="4"></textarea>
                    </div>
                    <div class="text-center">
                        <button
                            class="bg-primary text-on-primary px-12 py-3 rounded-lg font-label-md hover:opacity-90 transition-all shadow-md w-full md:w-auto"
                            type="submit">Envoyer le message</button>
                    </div>
                </form>
            </div>
        </div>
    </section>
{% endblock %}
